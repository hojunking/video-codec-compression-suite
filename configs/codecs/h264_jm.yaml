codec: h264_jm
family: h264
runner: jm
encoder: lencod.exe

quality:
  requested_qp: 37
  quality_param_kind: qp
  qp_mapping: identity

prediction:
  gop_size: 32
  b_frames: 3
  closed_gop: true
  scenecut: false

jm:
  encoder_path: null
  workdir: null
  level_idc: 51
  extra_args: []

parallel:
  # JM is slow; prefer job-level parallelism across independent videos/scenes.
  job_workers: 1
  encoder_threads_supported: false

logs:
  keep_native_stdout: true
  keep_native_stderr: true
  normalize_to_hevc_csv: true
  dummy_missing_fields: true
