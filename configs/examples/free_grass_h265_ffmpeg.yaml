codec: h265_ffmpeg
family: h265
runner: ffmpeg
encoder: libx265

quality:
  requested_qp: 37
  quality_param_kind: qp
  qp_mapping: identity

prediction:
  gop_size: 32
  b_frames: 3
  closed_gop: true
  scenecut: false

x265:
  params:
    keyint: "{gop_size}"
    min-keyint: "{gop_size}"
    bframes: "{b_frames}"
    b-adapt: 0
    scenecut: 0
    open-gop: 0

ffmpeg:
  preset: medium
  extra_args: []

logs:
  keep_native_stdout: true
  keep_native_stderr: true
  normalize_to_hevc_csv: true

